<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Technology Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
  <div class="background-glow"></div>
  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Practice Mode</p>
      <h1>Digital Technology Quiz</h1>
      <p class="subtitle">The first variant in your DOCX is treated as the correct answer for each question.</p>
      <p class="quick-links">
        <a class="topic-link" href="index.html">Back to ICAO4 Quiz</a>
        <a class="topic-link" href="gas-turbine.html">Open Gas Turbine Engine Quiz</a>
      </p>
    </header>

    <section class="controls card" aria-label="Quiz controls">
      <div class="control-group">
        <label for="partSelect">Part</label>
        <select id="partSelect"></select>
      </div>
      <div class="control-group">
        <span class="metric-label">Progress</span>
        <strong id="partProgress">0 / 0 answered</strong>
      </div>
      <div class="control-group">
        <span class="metric-label">Part Score</span>
        <strong id="partScore">Not checked yet</strong>
      </div>
      <div class="actions">
        <button id="prevBtn" type="button">Previous Part</button>
        <button id="randomizeBtn" type="button">Randomize Answers</button>
        <button id="checkBtn" type="button" class="primary">Check Part</button>
        <button id="nextBtn" type="button">Next Part</button>
        <button id="resetBtn" type="button" class="ghost">Reset Part</button>
      </div>
    </section>

    <section id="status" class="status" role="status" aria-live="polite"></section>

    <section class="card quiz-panel">
      <ol id="questionList" class="question-list"></ol>
    </section>
  </main>

  <script src="digital-technology.js"></script>
</body>
</html>
